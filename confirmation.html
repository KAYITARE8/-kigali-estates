<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed - Kigali Estates</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <section class="section">
    <div class="container">
      <div id="confirmationContent" style="max-width:640px; margin:0 auto; text-align:center; padding:60px 0">
        <div style="font-size:72px">&#10003;</div>
        <p>Loading order details...</p>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/storage.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    (async () => {
      await initPage('');
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('orderId');

      if (!orderId) { window.location.href = 'index.html'; return; }

      const order = await getOrder(orderId);
      if (!order) { window.location.href = 'index.html'; return; }

      const paymentLabels = { momo: 'MTN Mobile Money', airtel: 'Airtel Money', bank: 'Bank Transfer', cash: 'Cash on Visit' };

      document.getElementById('confirmationContent').innerHTML = `
        <div style="background:var(--light-gray); border-radius:var(--radius); padding:40px; text-align:center; margin-bottom:32px">
          <div style="width:80px; height:80px; background:var(--success); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:36px; color:#fff">&#10003;</div>
          <h1 style="color:var(--success); font-size:28px; margin-bottom:8px">Order Confirmed!</h1>
          <p style="color:var(--gray)">Thank you, <strong>${order.customer.firstName} ${order.customer.lastName}</strong>! Your booking request has been received.</p>
          <div style="background:#fff; border-radius:var(--radius); padding:16px; margin-top:20px; display:inline-block">
            <div style="font-size:12px; color:var(--gray); text-transform:uppercase; letter-spacing:1px">Order ID</div>
            <div style="font-size:20px; font-weight:700; color:var(--primary); font-family:monospace">${order.id || orderId}</div>
          </div>
        </div>

        <div style="background:#fff; border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); text-align:left; margin-bottom:24px">
          <h3 style="margin-bottom:16px; font-size:18px">Order Details</h3>
          ${order.items.map(item => `
            <div style="display:flex; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid #f1f5f9">
              <img src="${item.image}" style="width:60px; height:45px; object-fit:cover; border-radius:4px">
              <div style="flex:1">
                <div style="font-weight:600; font-size:14px">${item.title}</div>
                <div style="font-size:12px; color:var(--gray)">Qty: ${item.qty}</div>
              </div>
              <div style="font-weight:600">${formatPrice(item.price * item.qty, item.currency)}</div>
            </div>
          `).join('')}
          <div style="display:flex; justify-content:space-between; padding-top:16px; font-size:18px; font-weight:700; color:var(--primary)">
            <span>Total</span>
            <span>${formatPrice(order.total, 'RWF')}</span>
          </div>
        </div>

        <div style="background:#fff; border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); text-align:left; margin-bottom:32px">
          <h3 style="margin-bottom:16px; font-size:18px">Customer Information</h3>
          <p style="font-size:14px; color:var(--gray); line-height:2">
            <strong>Name:</strong> ${order.customer.firstName} ${order.customer.lastName}<br>
            <strong>Email:</strong> ${order.customer.email}<br>
            <strong>Phone:</strong> ${order.customer.phone}<br>
            <strong>Address:</strong> ${order.customer.address}, ${order.customer.district}<br>
            <strong>Payment:</strong> ${paymentLabels[order.paymentMethod] || order.paymentMethod}<br>
            ${order.notes ? `<strong>Notes:</strong> ${order.notes}` : ''}
          </p>
        </div>

        <div style="background:rgba(26,95,74,0.08); border-radius:var(--radius); padding:20px; margin-bottom:32px; color:var(--primary)">
          &#128222; Our team will contact you at <strong>${order.customer.phone}</strong> within 24 hours to confirm your booking.
        </div>

        <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap">
          <a href="properties.html" class="btn btn-primary btn-lg">Browse More Properties</a>
          <a href="index.html" class="btn btn-outline btn-lg">Back to Home</a>
        </div>`;
    })();
  </script>
</body>
</html>
